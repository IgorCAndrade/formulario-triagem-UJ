<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Triagem Estilizado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .folha {
            background-color: white;
            width: 850px;
            padding: 50px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            min-height: 1100px;
        }

        h2 {
            text-decoration: underline;
            font-size: 1.2rem;
            margin-top: 30px;
            text-transform: uppercase;
        }

        .linha-form {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 10px;
        }

        label {
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        input[type="text"], 
        input[type="number"], 
        input[type="date"], 
        input[type="email"], 
        input[type="tel"],
        input[type="password"] {
            border: none;
            border-bottom: 1px solid #000;
            padding: 2px 5px;
            outline: none;
            font-family: "Courier New", Courier, monospace;
            background: transparent;
        }

        input:focus {
            background-color: #fff9c4;
        }

        .flex-grow {
            flex-grow: 1;
        }

        button {
            margin-top: 40px;
            padding: 10px 30px;
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background-color: #34495e;
        }

        fieldset {
            border: 1px solid #999;
            padding: 15px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        legend {
            font-weight: bold;
            text-transform: uppercase;
            padding: 0 8px;
        }

        .checkbox-group {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

<div class="folha">
    <form action="#">
        
        <div style="text-align: right;">
            <label>GRUPO TERAPÊUTICO ( )</label><br>
            <label>DATA: ____/____/____</label>
        </div>

        <h2>1- IDENTIFICAÇÃO:</h2>

        <div class="linha-form">
            <label for="nome">NOME:</label>
            <input 
                type="text" 
                id="nome" 
                class="flex-grow"
                placeholder="Digite o nome completo"
                minlength="3"
                maxlength="100"
                required
            >
        </div>

        <div class="linha-form">
            <label for="cpf">CPF:</label>
            <input 
                type="text" 
                id="cpf" 
                style="width: 250px;"
                placeholder="000.000.000-00"
                pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
                required
            >

            <label for="rg">RG:</label>
            <input 
                type="text" 
                id="rg" 
                class="flex-grow"
                placeholder="Digite o RG"
                minlength="5"
                maxlength="20"
            >
        </div>

        <div class="linha-form">
            <label for="endereco">ENDEREÇO:</label>
            <input 
                type="text" 
                id="endereco" 
                class="flex-grow"
                placeholder="Rua, avenida, etc."
                minlength="5"
                maxlength="120"
                required
            >
        </div>

        <div class="linha-form">
            <label for="n">Nº:</label>
            <input type="text" id="n" style="width: 80px;" placeholder="123">

            <label for="bairro">BAIRRO:</label>
            <input 
                type="text" 
                id="bairro" 
                class="flex-grow"
                placeholder="Digite o bairro"
                minlength="3"
                maxlength="50"
            >

            <label for="cep">CEP:</label>
            <input 
                type="text" 
                id="cep" 
                style="width: 150px;"
                placeholder="00000-000"
                pattern="\d{5}-\d{3}"
                required
            >
        </div>

        <div class="linha-form">
            <label for="telefone">TELEFONE:</label>
            <input 
                type="tel" 
                id="telefone" 
                style="width: 200px;"
                placeholder="(71) 99999-9999"
                pattern="\(\d{2}\)\s\d{4,5}-\d{4}"
                required
            >

            <label for="email">EMAIL:</label>
            <input 
                type="email" 
                id="email" 
                class="flex-grow"
                placeholder="exemplo@email.com"
            >
        </div>

        <div class="linha-form">
            <label for="senha">SENHA:</label>
            <input 
                type="password" 
                id="senha"
                placeholder="Digite uma senha"
                minlength="6"
                maxlength="12"
                required
            >
        </div>

        <div class="linha-form">
            <label for="nasc">DATA DE NASCIMENTO:</label>
            <input type="date" id="nasc">

            <label for="idade">IDADE:</label>
            <input type="number" id="idade" style="width: 60px;" min="0" max="120">

            <label for="genero">GÊNERO:</label>
            <input type="text" id="genero" class="flex-grow">
        </div>

        <div class="linha-form">
            <label for="escolaridade">ESCOLARIDADE:</label>
            <input type="text" id="escolaridade" style="width: 300px;">
            
            <label for="profissao">PROFISSÃO:</label>
            <input type="text" id="profissao" class="flex-grow">
        </div>

        <div class="linha-form">
            <label for="naturalidade">NATURALIDADE:</label>
            <input type="text" id="naturalidade" style="width: 200px;">
            
            <label for="estado_civil">ESTADO CIVIL:</label>
            <input type="text" id="estado_civil" style="width: 150px;">
            
            <label for="religiao">RELIGIÃO:</label>
            <input type="text" id="religiao" class="flex-grow">
        </div>

        <fieldset>
            <legend>ALUNO UJ</legend>

            <div class="linha-form checkbox-group">
                <label>
                    <input type="checkbox" name="aluno_uj" value="sim"> Sim
                </label>

                <label>
                    <input type="checkbox" name="aluno_uj" value="nao"> Não
                </label>
            </div>

            <div class="linha-form">
                <label for="curso">CURSO:</label>
                <input type="text" id="curso" style="width: 250px;">

                <label for="sem">SEM:</label>
                <input type="text" id="sem" style="width: 50px;">

                <label for="turno">TURNO:</label>
                <input type="text" id="turno" style="width: 100px;">
            </div>
        </fieldset>

        <h2>2- DADOS SOBRE A FAMÍLIA:</h2>

        <fieldset>
            <legend>DADOS DO PAI</legend>

            <div class="linha-form">
                <label for="nome_pai">NOME DO PAI:</label>
                <input type="text" id="nome_pai" class="flex-grow">

                <label for="idade_pai">IDADE:</label>
                <input type="number" id="idade_pai" style="width: 60px;" min="0" max="120">
            </div>

            <div class="linha-form">
                <label for="prof_pai">PROFISSÃO:</label>
                <input type="text" id="prof_pai" style="width: 350px;">

                <label for="esc_pai">ESCOLARIDADE:</label>
                <input type="text" id="esc_pai" class="flex-grow">
            </div>
        </fieldset>

        <fieldset>
            <legend>DADOS DA MÃE</legend>

            <div class="linha-form">
                <label for="nome_mae">NOME DA MÃE:</label>
                <input type="text" id="nome_mae" class="flex-grow">

                <label for="idade_mae">IDADE:</label>
                <input type="number" id="idade_mae" style="width: 60px;" min="0" max="120">
            </div>

            <div class="linha-form">
                <label for="prof_mae">PROFISSÃO:</label>
                <input type="text" id="prof_mae" style="width: 350px;">

                <label for="esc_mae">ESCOLARIDADE:</label>
                <input type="text" id="esc_mae" class="flex-grow">
            </div>
        </fieldset>

        <fieldset>
            <legend>INFORMAÇÕES COMPLEMENTARES</legend>

            <div class="linha-form">
                <label>RENDA FAMILIAR:</label>
                <label><input type="checkbox" name="renda" value="ate2"> ATÉ 2 SALÁRIOS MÍNIMOS</label>
                <label><input type="checkbox" name="renda" value="mais2"> MAIS QUE 2 SALÁRIOS MÍNIMOS</label>
            </div>

            <div class="linha-form">
                <label for="resp">RESPONSÁVEL PRESENTE NA TRIAGEM:</label>
                <input type="text" id="resp" class="flex-grow">
            </div>
        </fieldset>

        <div style="text-align: center;">
            <button type="submit">GERAR DOCUMENTO</button>
        </div>
    </form>
</div>

</body>
</html>
